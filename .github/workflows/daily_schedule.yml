name: Automated Data Hygiene Pipeline

# 1. The Trigger: This tells the system WHEN to run.
on:
  schedule:
    # This specific code (cron) means: "Run at midnight, every single day"
    - cron: '0 0 * * *'

  # This line allows you to also trigger it manually by clicking a button on GitHub
  workflow_dispatch:

# 2. The Machine: This tells GitHub what kind of computer to borrow
jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    # 3. The Instructions: Step-by-step commands for the server
    steps:
      - name: Check out the repository files
        uses: actions/checkout@v3

      - name: Set up Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Data Engineering Libraries
        run: |
          pip install pandas numpy

      - name: Run E-Commerce Data Pipeline
        run: |
          python ecommerce_pipeline.py

      - name: Upload Cleaned E-Commerce Data Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleaned_ecommerce_data
          path: cleaned_ecommerce_data.csv
